<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Dashboard</title>

  <style>

    @media print {

      /* Hide everything */
      body * {
        visibility: hidden;
      }

      /* Show only print area */
      #print-area, #print-area * {
        visibility: visible;
      }

      /* Position print content */
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      /* Hide buttons */
      .print\:hidden {
        display: none !important;
      }

      /* A4 size */
      @page {
        size: A4;
        margin: 0;
      }

      body {
        margin: 0;
      }

      #print-area {
        width: 210mm;
        height: 297mm;
        page-break-after: avoid;
        page-break-inside: avoid;
        overflow: hidden;
      }

      table, tr, td {
        page-break-inside: avoid;
      }

      @media print {
        #print-area {
          transform: scale(0.95);
          transform-origin: top left;
        }
      }

    }

  </style>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#026e9f",
            backgroundLight: "#f5f7f8",
            backgroundDark: "#0f1d23"
          }
        }
      }
    }
  </script>

  <!-- Fonts -->

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->

  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    rel="stylesheet"
  />

</head>

<body class="bg-backgroundLight">

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCf_Zs7bjEx1EBA49sZ7pdtBUE6Fibzaa4&v=beta&libraries=marker"></script>
</body>

</html>
